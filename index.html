<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Walk: Multi-Model Visualizer</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f5f5f5; }
        h1 { margin-bottom: 10px; color: #333; }
        
        /* Control Panel Styling */
        .controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block; max-width: 950px; }
        .group { display: inline-block; border-right: 1px solid #ddd; padding-right: 15px; margin-right: 10px; vertical-align: middle; }
        .group:last-child { border-right: none; }
        
        button { padding: 8px 12px; font-size: 14px; margin: 3px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background-color: #eee; transition: background 0.2s; }
        button:hover { background-color: #ddd; }
        button.active { background-color: #007bff; color: white; border-color: #0056b3; }
        button.run { background-color: #28a745; color: white; border-color: #1e7e34; }
        button.stop { background-color: #dc3545; color: white; border-color: #bd2130; }
        button.preset { background-color: #6610f2; color: white; border-color: #520dc2; }

        /* Graph Container */
        #graph {
            width: 100%; max-width: 800px; height: 600px;
            margin: 20px auto; background-color: white;
            border: 1px solid #ccc; border-radius: 4px;
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        /* Nodes and Edges */
        .node {
            position: absolute; width: 55px; height: 55px;
            border: 1px solid #333; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; color: #333;
            cursor: pointer; transition: transform 0.1s; user-select: none;
            background-color: white; z-index: 2;
        }
        .node:hover { transform: scale(1.1); border-width: 2px; }
        
        /* Start Node Highlight Ring */
        .startnode { 
            box-shadow: 0 0 0 4px rgba(200, 53, 0, 0.4); 
            border: 2px solid red !important;
        }
        
        .edge {
            position: absolute; height: 2px; background-color: #999;
            transform-origin: 0% 50%; z-index: 1; pointer-events: stroke;
        }
        .edge-label {
            position: absolute; font-size: 12px; color: #666; background: rgba(255,255,255,0.8);
            padding: 2px; border-radius: 3px; pointer-events: none; z-index: 3;
        }

        /* Toggles */
        .switch { position: relative; display: inline-block; width: 40px; height: 24px; vertical-align: middle; margin: 0 5px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(16px); }

        #TimeLabel { pointer-events: none; }
        #AdjMatrix { white-space: pre; font-family: monospace; font-size: 11px; margin-top: 20px; text-align: left; background: #fff; padding: 10px; border: 1px solid #ddd; max-height: 200px; overflow: auto; display: none; }
        
        /* Helper text */
        #status-text { margin-top: 5px; font-size: 14px; color: #555; font-style: italic;}
    </style>
</head>
<body>

    <h1>Quantum Walk Visualization</h1>
    
    <div class="controls">
        <div class="group">
            <button onclick="setMode('AddNode')" id="btn-node">Add Node</button>
            <button onclick="setMode('AddEdge')" id="btn-edge">Add Edge</button>
            <button onclick="setMode('Delete')" id="btn-del">Delete</button>
            <button onclick="setMode('SetStart')" id="btn-start">Set Start</button>
        </div>
        
        <div class="group">
            <button class="preset" onclick="loadChiralGhostTrick()">Chiral Ghost Trick</button>
            <button class="preset" onclick="loadCustomChain()">Path Pn</button>
            <button class="preset" onclick="loadRegularCycle()">Regular Cycle Cn</button>
            <button class="preset" onclick="loadCirculantGraph()">Oriented Cycle C'n</button>
            <button class="preset" onclick="loadTransitiveTournament()">Transitive Tournament Tn</button>
        </div>

        <div class="group">
            <span>Weighted Edges:</span>
            <label class="switch">
                <input type="checkbox" id="weight_flag">
                <span class="slider"></span>
            </label>
        </div>

        <div class="group" style="border:none">
            <button class="run" onclick="run()">Run</button>
            <button class="stop" onclick="stop()">Stop</button>
            <button onclick="reset()">Clear All</button>
            <button onclick="plotGraph()" style="background-color: #17a2b8; color: white; border-color: #117a8b;">Plot Graph</button>
            <button onclick="calculateCustomGraphMath()" style="background-color: #ffc107; color: black; border-color: #d39e00; font-weight: bold;">Average Mixing Matrix</button>
        </div>
        <br>
    </div>
    
    <div id="status-text">Ready.</div>

    <div id="graph">
        <div id="TimeLabel" style="position: absolute; top: 10px; right: 10px; font-size: 16px; font-weight: bold;">t: 0.0</div>
    </div>
    
    <div id="MathDisplay" style="display:none; width: 100%; max-width: 800px; margin: 20px auto; background: white; padding: 15px; border: 1px solid #ccc; border-radius: 4px; overflow-x: auto; text-align: left;">
    </div>

    <div id="chartContainer" style="display:none; width: 100%; max-width: 800px; margin: 20px auto; background: white; padding: 15px; border: 1px solid #ccc; border-radius: 4px;">
        <canvas id="probChart" width="800" height="400"></canvas>
    </div>

    <div id="AdjMatrix"></div>

    <script>
        // --- Global State ---
        let nodes = [];
        let edges = [];
        let StartNodes = []; 
        let SelectedNodes = [];
        let mode = 'AddNode';
        let running = false;
        let step = 0;
        let timestep = 0;
        let AdjMatrix = [];
        let SimulationType = "Generic"; 

        // Color Scale (White to Bright Green)
        const ColorScale = d3.scaleSequential(d3.interpolateViridis).domain([0, 1]); 

        // --- Initialization ---
        function setMode(newMode) {
            mode = newMode;
            SelectedNodes = [];
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(newMode === 'AddNode') document.getElementById('btn-node').classList.add('active');
            if(newMode === 'AddEdge') document.getElementById('btn-edge').classList.add('active');
            if(newMode === 'Delete') document.getElementById('btn-del').classList.add('active');
            if(newMode === 'SetStart') document.getElementById('btn-start').classList.add('active');
            
            updateStatus(`Mode: ${newMode}`);
        }
        setMode('AddNode');

        function updateStatus(text){
            document.getElementById('status-text').innerText = text;
        }

        // --- Core Graph Functions ---
        function reset() {
            nodes = [];
            edges = [];
            StartNodes = [];
            running = false;
            timestep = 0;
            SimulationType = "Generic";
            render();
            updateStatus("Canvas cleared.");
            document.getElementById("chartContainer").style.display = "none"; 
            document.getElementById("MathDisplay").style.display = "none"; 
        }


        // ==========================================
        // FEATURE: TRANSITIVE TOURNAMENT (T_n)
        // ==========================================
        function loadTransitiveTournament() {
            let n_str = prompt("Enter number of nodes n for Transitive Tournament T_n:", "4");
            if(!n_str) return;
            let n = parseInt(n_str);
            if(isNaN(n) || n < 3) {
                alert("Please enter a valid number >= 3.");
                return;
            }

            reset();
            SimulationType = "Generic"; 
            
            const centerX = 400;
            const centerY = 300;
            const radius = 180;
            
            // Arrange nodes in a circle for neatness
            for (let i = 0; i < n; i++) {
                let angle = -Math.PI / 2 + (i * 2 * Math.PI / n);
                nodes.push({ id: i, x: centerX + radius * Math.cos(angle) - 27, y: centerY + radius * Math.sin(angle) - 27 });
            }

            // Create Transitive Tournament edges: i to j with weight '1j' for all i < j
            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    edges.push([i, j, '1j']);
                }
            }

            StartNodes = []; render(); setMode('SetStart'); 
            calculateTournamentMath(n);
        }

        async function calculateTournamentMath(n) {
            updateStatus("Calculating Eigenvalues and Average Mixing Matrix...");
            if (!window.pyodide) window.pyodide = await loadPyodide();
            await pyodide.loadPackage(["numpy", "scipy"]);

            const pyCode = `
import numpy as np
import scipy.linalg
import json

n = ${n}

# Build Hamiltonian for Transitive Tournament T_n
H = np.zeros((n, n), dtype=complex)
for i in range(n):
    for j in range(i+1, n):
        H[i, j] = 1j
        H[j, i] = -1j

# Calculate Eigenvalues and Eigenvectors
evals, evecs = np.linalg.eigh(H)

rounded_evals = np.round(evals, 5)
unique_evals = np.unique(rounded_evals)

M_avg = np.zeros((n, n), dtype=float)

for val in unique_evals:
    indices = np.where(rounded_evals == val)[0]
    E_r = np.zeros((n, n), dtype=complex)
    
    # Projection matrix E_r
    for k in indices:
        v_k = evecs[:, k].reshape(n, 1)
        E_r += v_k @ v_k.conj().T
    
    M_avg += np.abs(E_r)**2

evals_out = [round(x, 4) for x in unique_evals.tolist()]
m_avg_out = np.round(M_avg, 4).tolist()

json.dumps({
    "eigenvalues": evals_out,
    "mixing_matrix": m_avg_out
})
`;
            try {
                let res = await pyodide.runPythonAsync(pyCode);
                let data = JSON.parse(res);
                displayMathResults(`Transitive Tournament T<sub>${n}</sub>`, data.eigenvalues, data.mixing_matrix);
                updateStatus(`Mode: Transitive Tournament T_${n}. Select Start Node(s).`);
                alert(`Calculated Eigen properties and Average Mixing Matrix for T_${n}! Check the panel below the graph.`);
            } catch(e) {
                console.error(e);
                updateStatus("Error calculating math.");
            }
        }

        
        function loadChiralGhostTrick() {
            reset();
            SimulationType = "Generic"; 
            
            const centerX = 400;
            const centerY = 300;
            const radius = 180;
            
            const angles = {
                5: -Math.PI / 2,
                0: -Math.PI / 2 + (2 * Math.PI / 6),                          
                1: -Math.PI / 2 + (4 * Math.PI / 6),      
                3: -Math.PI / 2 + (6 * Math.PI / 6),      
                4: -Math.PI / 2 + (8 * Math.PI / 6),      
                2: -Math.PI / 2 + (10 * Math.PI / 6)       
            };

            nodes = [5, 0, 1, 3, 4, 2].map(id => ({
                id: id,
                x: centerX + radius * Math.cos(angles[id]) - 27,
                y: centerY + radius * Math.sin(angles[id]) - 27
            }));
            nodes.sort((a, b) => a.id - b.id);

            edges = [
                [0, 1, '1j'], [1, 3, '1j'], [3, 4, '1j'], [4, 2, '1j'], [2, 0, '1j'], 
                [5, 0, '1'],  [5, 1, '1'],  [5, 2, '1'],  [5, 4, '1'],  [5, 3, '1'],  
                [4, 0, '1j'], [0, 3, '1j'], [2, 1, '1j'], [1, 4, '1j'], [3, 2, '1j']  
            ];

            StartNodes = []; 
            render();
            setMode('SetStart'); 
            alert("Loaded Custom 6-Node Pentagon.\nPLEASE CLICK ONE OR MORE NODES to select the Start State(s).");
            updateStatus("Mode: Custom Graph. Select Start Node(s).");
        }

        function loadRegularCycle() {
            let n_str = prompt("Enter number of nodes n for Regular Cycle C_n:", "5");
            if(!n_str) return;
            let n = parseInt(n_str);
            if(isNaN(n) || n < 3) { alert("Please enter a valid number >= 3."); return; }
            reset(); SimulationType = "Generic"; 
            const centerX = 400, centerY = 300, radius = 180;
            for (let i = 0; i < n; i++) {
                let angle = -Math.PI / 2 + (i * 2 * Math.PI / n);
                nodes.push({ id: i, x: centerX + radius * Math.cos(angle) - 27, y: centerY + radius * Math.sin(angle) - 27 });
            }
            for (let i = 0; i < n; i++) { edges.push([i, (i + 1) % n, '1']); }
            StartNodes = []; render(); setMode('SetStart'); 
            calculateRegularCycleMath(n);
        }

        async function calculateRegularCycleMath(n) {
            updateStatus("Calculating Eigenvalues and Average Mixing Matrix...");
            if (!window.pyodide) window.pyodide = await loadPyodide();
            await pyodide.loadPackage(["numpy", "scipy"]);
            const pyCode = `
import numpy as np
import scipy.linalg
import json
n = ${n}
H = np.zeros((n, n), dtype=float)
for i in range(n):
    H[i, (i+1)%n] = 1.0
    H[(i+1)%n, i] = 1.0
evals, evecs = np.linalg.eigh(H)
rounded_evals = np.round(evals, 5)
unique_evals = np.unique(rounded_evals)
M_avg = np.zeros((n, n), dtype=float)
for val in unique_evals:
    indices = np.where(rounded_evals == val)[0]
    E_r = np.zeros((n, n), dtype=complex)
    for k in indices:
        v_k = evecs[:, k].reshape(n, 1)
        E_r += v_k @ v_k.conj().T
    M_avg += np.abs(E_r)**2
evals_out = [round(x, 4) for x in unique_evals.tolist()]
m_avg_out = np.round(M_avg, 4).tolist()
json.dumps({ "eigenvalues": evals_out, "mixing_matrix": m_avg_out })
`;
            try {
                let res = await pyodide.runPythonAsync(pyCode);
                let data = JSON.parse(res);
                displayMathResults(`Regular Cycle C<sub>${n}</sub>`, data.eigenvalues, data.mixing_matrix);
                updateStatus(`Mode: Regular Cycle C_${n}. Select Start Node(s).`);
            } catch(e) { console.error(e); updateStatus("Error calculating math."); }
        }

        function loadCustomChain() {
            let n_str = prompt("Enter number of nodes N for Linear Chain:", "5");
            if(!n_str) return;
            let n = parseInt(n_str);
            if(isNaN(n) || n < 2) { alert("Please enter a valid number >= 2."); return; }
            reset(); SimulationType = "Generic"; 
            let startX = 50, startY = 300, gapX = 700 / Math.max(1, n - 1);
            for(let i = 0; i < n; i++) { nodes.push({ id: i, x: startX + (i * gapX) - 27, y: startY - 27, label: i.toString() }); }
            for(let i = 0; i < n - 1; i++) { edges.push([i, i + 1, '1']); }
            StartNodes = []; render(); setMode('SetStart');
            calculateChainMath(n);
        }

        async function calculateChainMath(n) {
            updateStatus("Calculating Eigenvalues and Average Mixing Matrix...");
            if (!window.pyodide) window.pyodide = await loadPyodide();
            await pyodide.loadPackage(["numpy", "scipy"]);
            const pyCode = `
import numpy as np
import json
n = ${n}
H = np.zeros((n, n), dtype=float)
for i in range(n-1):
    H[i, i+1] = 1.0
    H[i+1, i] = 1.0
evals, evecs = np.linalg.eigh(H)
rounded_evals = np.round(evals, 5)
unique_evals = np.unique(rounded_evals)
M_avg = np.zeros((n, n), dtype=float)
for val in unique_evals:
    indices = np.where(rounded_evals == val)[0]
    E_r = np.zeros((n, n), dtype=complex)
    for k in indices:
        v_k = evecs[:, k].reshape(n, 1)
        E_r += v_k @ v_k.conj().T
    M_avg += np.abs(E_r)**2
evals_out = [round(x, 4) for x in unique_evals.tolist()]
m_avg_out = np.round(M_avg, 4).tolist()
json.dumps({ "eigenvalues": evals_out, "mixing_matrix": m_avg_out })
`;
            try {
                let res = await pyodide.runPythonAsync(pyCode);
                let data = JSON.parse(res);
                displayMathResults(`Linear Chain P<sub>${n}</sub>`, data.eigenvalues, data.mixing_matrix);
                updateStatus(`Mode: Linear Chain P_${n}. Select Start Node(s).`);
            } catch(e) { console.error(e); updateStatus("Error calculating math."); }
        }

        function loadCirculantGraph() {
            let n_str = prompt("Enter number of nodes n for Oriented Circulant Cycle C_n:", "5");
            if(!n_str) return;
            let n = parseInt(n_str);
            if(isNaN(n) || n < 3) { alert("Please enter a valid number >= 3."); return; }
            reset(); SimulationType = "Generic"; 
            const centerX = 400, centerY = 300, radius = 180;
            for (let i = 0; i < n; i++) {
                let angle = -Math.PI / 2 + (i * 2 * Math.PI / n);
                nodes.push({ id: i, x: centerX + radius * Math.cos(angle) - 27, y: centerY + radius * Math.sin(angle) - 27 });
            }
            for (let i = 0; i < n; i++) { edges.push([i, (i + 1) % n, '-1j']); }
            StartNodes = []; render(); setMode('SetStart'); 
            calculateCirculantMath(n);
        }

        async function calculateCirculantMath(n) {
            updateStatus("Calculating Eigenvalues and Average Mixing Matrix...");
            if (!window.pyodide) window.pyodide = await loadPyodide();
            await pyodide.loadPackage(["numpy"]);
            const pyCode = `
import numpy as np
import json
n = ${n}
j_idx, k_idx = np.meshgrid(np.arange(n), np.arange(n))
F = (1.0 / np.sqrt(n)) * np.exp(2j * np.pi * j_idx * k_idx / n)
c = np.zeros(n, dtype=complex)
c[1] = -1j
c[-1] = 1j
eigenvalues = np.zeros(n)
for k in range(n):
    val = c[1] * np.exp(2j * np.pi * 1 * k / n) + c[-1] * np.exp(2j * np.pi * (n-1) * k / n)
    eigenvalues[k] = np.real(val)
rounded_evals = np.round(eigenvalues, 5)
unique_evals = np.unique(rounded_evals)
M_avg = np.zeros((n, n), dtype=float)
for val in unique_evals:
    indices = np.where(rounded_evals == val)[0]
    E_r = np.zeros((n, n), dtype=complex)
    for k in indices:
        v_k = F[:, k].reshape(n, 1)
        E_r += v_k @ v_k.conj().T
    M_avg += np.abs(E_r)**2
evals_out = [round(x, 4) for x in unique_evals.tolist()]
m_avg_out = np.round(M_avg, 4).tolist()
json.dumps({ "eigenvalues": evals_out, "mixing_matrix": m_avg_out })
`;
            try {
                let res = await pyodide.runPythonAsync(pyCode);
                let data = JSON.parse(res);
                displayMathResults(`Oriented Cycle C<sub>${n}</sub>`, data.eigenvalues, data.mixing_matrix);
                updateStatus(`Mode: Oriented Cycle C_${n}. Select Start Node(s).`);
            } catch(e) { console.error(e); updateStatus("Error calculating math."); }
        }

        // ==========================================
        // FEATURE: ANY CUSTOM GRAPH MATH
        // ==========================================
        async function calculateCustomGraphMath() {
            if (nodes.length === 0) {
                alert("Please add some nodes and edges to the canvas first.");
                return;
            }

            updateStatus("Calculating Eigenvalues and Average Mixing Matrix for Custom Graph...");
            if (!window.pyodide) window.pyodide = await loadPyodide();
            await pyodide.loadPackage(["numpy", "scipy"]);

            // Ensure we are interpreting the drawn graph via Generic Adjacency Matrix
            SimulationType = "Generic";
            const MatrixData = generateAdjacencymatrix();

            const pyCode = `
import numpy as np
import scipy.linalg
import json

try:
    H_raw = ${JSON.stringify(MatrixData)}
    
    # Safely convert the JS generated strings into Python complex numbers
    H_clean = []
    for row in H_raw:
        clean_row = []
        for val in row:
            if isinstance(val, str):
                val = val.replace(' ', '')
                if val == 'j': val = '1j'
                elif val == '-j': val = '-1j'
            clean_row.append(complex(val))
        H_clean.append(clean_row)

    H = np.array(H_clean, dtype=complex)
    n = H.shape[0]

    # Calculate Eigenvalues and Eigenvectors assuming Hermitian nature
    evals, evecs = np.linalg.eigh(H)
    
    rounded_evals = np.round(evals, 5)
    unique_evals = np.unique(rounded_evals)

    M_avg = np.zeros((n, n), dtype=float)

    for val in unique_evals:
        indices = np.where(rounded_evals == val)[0]
        E_r = np.zeros((n, n), dtype=complex)
        
        # Projection matrix E_r
        for k in indices:
            v_k = evecs[:, k].reshape(n, 1)
            E_r += v_k @ v_k.conj().T
        
        M_avg += np.abs(E_r)**2

    evals_out = [round(float(x), 4) for x in unique_evals]
    m_avg_out = np.round(M_avg, 4).tolist()

    res = json.dumps({
        "eigenvalues": evals_out,
        "mixing_matrix": m_avg_out
    })
except Exception as e:
    res = json.dumps({"error": str(e)})

res
`;
            try {
                let res = await pyodide.runPythonAsync(pyCode);
                let data = JSON.parse(res);
                if (data.error) {
                    console.error("Python Error:", data.error);
                    alert("Error calculating math. Ensure your custom edge weights are valid numbers or complex values (e.g. '1', '1j', '-0.5j').");
                    updateStatus("Failed to calculate math.");
                    return;
                }
                displayMathResults(`Custom Graph (N=${nodes.length})`, data.eigenvalues, data.mixing_matrix);
                updateStatus("Math calculated for Custom Graph. Check the panel below.");
            } catch(e) {
                console.error(e);
                updateStatus("Failed to generate math data.");
            }
        }

        // --- Shared Math Display Function ---
        function displayMathResults(titleHtml, evals, matrix) {
            let div = document.getElementById("MathDisplay");
            let n = matrix.length;
            
            let html = `<h3 style="margin-top: 0; color: #2196F3;">${titleHtml}</h3>`;
            html += `<p><strong>Unique Eigenvalues:</strong> ${evals.join(', ')}</p>`;
            html += `<p><strong>Average Mixing Matrix:</strong></p>`;
            
            let table = `<table style="border-collapse: collapse; width: 100%; text-align: center; font-size: 13px;" border="1">`;
            for (let r = 0; r < n; r++) {
                table += `<tr>`;
                for (let c = 0; c < n; c++) {
                    let bg = (r === c) ? "#f0f8ff" : "transparent";
                    table += `<td style="padding: 5px; background: ${bg};">${matrix[r][c].toFixed(4)}</td>`;
                }
                table += `</tr>`;
            }
            table += `</table>`;
            
            div.innerHTML = html + table;
            div.style.display = "block";
            div.scrollIntoView({ behavior: "smooth" });
        }

        // --- Complex Number Utilities ---
        function ReadComplex(string) {
            string = string.trim().replace(/\s/g, ''); 
            if (!string) return { real: 1, imag: 0 };
            if (/^-?\d*\.?\d*$/.test(string)) return { real: parseFloat(string), imag: 0 };
            if (/^-?\d*\.?\d*j$/.test(string)) return { real: 0, imag: parseFloat(string.replace('j', '')) || 0 };
            const match = string.match(/^([-+]?\d*\.?\d*)([-+]\d*\.?\d*)j$/);
            if (match) return { real: parseFloat(match[1]), imag: parseFloat(match[2]) };
            return { real: 1, imag: 0 };
        }

        function FormatComplex({ real, imag }) {
            if (Math.abs(imag) < 0.001) return real.toFixed(2);
            if (Math.abs(real) < 0.001) return `${imag.toFixed(2)}j`;
            return `${real.toFixed(1)}${imag >= 0 ? '+' : ''}${imag.toFixed(1)}j`;
        }

        function generateAdjacencymatrix() {
            let NodeCount = nodes.length;
            AdjMatrix = Array.from({ length: NodeCount }, () => Array(NodeCount).fill({ real: 0, imag: 0 }));
            edges.forEach(edge => {
                const [node1, node2, weight] = edge;
                try {
                    const { real, imag } = ReadComplex(weight.toString());
                    AdjMatrix[node1][node2] = { real, imag };
                    AdjMatrix[node2][node1] = { real, imag: -imag };
                } catch (e) {}
            });
            const matrixText = AdjMatrix.map(row => row.map(c => FormatComplex(c)).join('\t')).join('\n');
            document.getElementById("AdjMatrix").innerText = matrixText;
            return AdjMatrix.map(row => row.map(c => FormatComplex(c)));
        }

        // --- Render Loop ---
        function render(probabilities = null) {
            const graph = document.getElementById("graph");
            const timeLabel = document.getElementById("TimeLabel");
            graph.innerHTML = "";
            graph.appendChild(timeLabel);

            edges.forEach(([u, v, w], index) => {
                const n1 = nodes.find(n => n.id === u);
                const n2 = nodes.find(n => n.id === v);
                if (!n1 || !n2) return;

                const ex = (n1.x + n2.x) / 2;
                const ey = (n1.y + n2.y) / 2;
                const len = Math.hypot(n2.x - n1.x, n2.y - n1.y);
                const angle = Math.atan2(n2.y - n1.y, n2.x - n1.x);

                const div = document.createElement("div");
                div.className = "edge";
                div.style.width = `${len}px`;
                div.style.left = `${n1.x + 27}px`;
                div.style.top = `${n1.y + 27}px`;
                div.style.transform = `rotate(${angle}rad)`;
                div.onclick = () => EdgeClicked(index);
                graph.appendChild(div);

                if(SimulationType === "Generic") {
                    const lbl = document.createElement("div");
                    lbl.className = "edge-label";
                    lbl.innerText = w;
                    lbl.style.left = `${ex + 15}px`;
                    lbl.style.top = `${ey}px`;
                    graph.appendChild(lbl);
                }
            });

            nodes.forEach(node => {
                const el = document.createElement("div");
                el.className = "node";
                el.style.left = `${node.x}px`;
                el.style.top = `${node.y}px`;
                
                let prob = 0;
                if (probabilities && probabilities[node.id] !== undefined) { prob = probabilities[node.id]; } 
                else if (StartNodes.includes(node.id) && !probabilities) { prob = 1.0 / StartNodes.length; }
                
                el.style.backgroundColor = ColorScale(prob);
                el.style.color = prob > 0.4 ? "black" : "white"; 
                
                let displayText = (SimulationType === "Generic") ? node.id : node.label;
                if(prob > 0.01) { el.innerHTML = `${displayText}<br><span style="font-size:9px">${prob.toFixed(2)}</span>`; } 
                else { el.innerHTML = `${displayText}`; }

                if (StartNodes.includes(node.id)) el.classList.add("startnode");
                el.onclick = () => NodeClicked(node.id);
                graph.appendChild(el);
            });

            if (timeLabel) timeLabel.innerText = `Time: ${timestep.toFixed(2)}`;
        }

        // --- Interactions ---
        function NodeClicked(id) {
            if (mode === 'SetStart' || SimulationType.startsWith("Hamiltonian")) {
                const index = StartNodes.indexOf(id);
                if (index > -1) { StartNodes.splice(index, 1); } 
                else { StartNodes.push(id); }
                render();
                updateStatus(`Start States Set to: ${StartNodes.join(', ')}`);
                return;
            }
            if (mode === 'Delete') {
                nodes = nodes.filter(n => n.id !== id);
                edges = edges.filter(e => !e.includes(id));
                render();
            }
            if (mode === 'AddEdge') {
                SelectedNodes.push(id);
                if (SelectedNodes.length === 2) {
                    const wFlag = document.getElementById("weight_flag").checked;
                    let w = "1";
                    if (wFlag) w = prompt("Complex weight (e.g. 1j, 0.5):", "1") || "1";
                    const exists = edges.some(e => (e[0]===SelectedNodes[0] && e[1]===SelectedNodes[1]) || (e[0]===SelectedNodes[1] && e[1]===SelectedNodes[0]));
                    if(!exists) edges.push([...SelectedNodes, w]);
                    SelectedNodes = [];
                    render();
                }
            }
        }

        function EdgeClicked(idx) { if (mode === 'Delete') { edges.splice(idx, 1); render(); } }

        document.getElementById("graph").addEventListener("click", (e) => {
            if (mode === 'AddNode' && SimulationType === 'Generic' && e.target.id === "graph") {
                const rect = e.target.getBoundingClientRect();
                nodes.push({ id: nodes.length, x: e.clientX - rect.left - 27, y: e.clientY - rect.top - 27 });
                render();
            }
        });

        function getStateBuilderCode(dim) {
            return `
start_indices = [${StartNodes.join(',')}]
state = np.zeros(${dim}, dtype=complex)
if len(start_indices) > 0:
    amp = 1.0 / np.sqrt(len(start_indices))
    for idx in start_indices:
        state[idx] = amp
`;
        }

        // --- SIMULATION ENGINE ---
        async function run() {
            if (StartNodes.length === 0) { alert("Please click at least one node to set the Start State(s) first."); return; }
            updateStatus("Initializing Python Environment...");
            if (!window.pyodide) window.pyodide = await loadPyodide();
            await pyodide.loadPackage(["numpy", "scipy"]);
            running = true; step = 0; updateStatus("Running...");
            
            let initCode = "";
            let commonHeader = `import numpy as np\nimport scipy.linalg\nfrom functools import reduce\ndef krons(*args): return reduce(np.kron, args)\nI = np.identity(2, dtype=complex)\nX = np.array([[0, 1], [1, 0]], dtype=complex)\nY = np.array([[0, -1j], [1j, 0]], dtype=complex)\nZ = np.array([[1, 0], [0, -1]], dtype=complex)\nops = {'I': I, 'X': X, 'Y': Y, 'Z': Z}\n`;
            
            if (SimulationType === "Generic") {
                const MatrixData = generateAdjacencymatrix();
                initCode = `import numpy as np\nimport scipy.linalg\nH = np.array(${JSON.stringify(MatrixData)}, dtype=complex)\n${getStateBuilderCode("len(H)")}`;
            }

            await pyodide.runPythonAsync(initCode);

            async function loop() {
                if (!running) return;
                timestep = step * 0.005; 
                const stepCode = `import json\nU = scipy.linalg.expm(-1j * H * ${timestep})\nprobs = np.abs(U @ state)**2\njson.dumps(probs.tolist())`;
                try {
                    let res = await pyodide.runPythonAsync(stepCode);
                    render(JSON.parse(res));
                    step++;
                    requestAnimationFrame(loop);
                } catch (e) { console.error(e); running = false; alert("Simulation Error in Python Execution"); }
            }
            loop();
        }

        function stop() { running = false; updateStatus("Stopped."); }

        // ===================================================================
        // 100-Interval Plotting Logic using Chart.js and Pyodide
        // ===================================================================

        let windowChartInstance = null;

        async function plotGraph() {
            if (nodes.length === 0) { alert("Please create nodes or load a preset first."); return; }
            if (StartNodes.length === 0) { alert("Please click at least one node to set the Start State(s) first."); return; }

            let maxTimeStr = prompt("Enter the maximum time T for the plot interval:", "10");
            if (!maxTimeStr) return;
            let maxTime = parseFloat(maxTimeStr);
            if (isNaN(maxTime) || maxTime <= 0) maxTime = 10;

            updateStatus("Initializing Python Environment for plotting...");
            if (!window.pyodide) window.pyodide = await loadPyodide();
            await pyodide.loadPackage(["numpy", "scipy"]);

            let initCode = "";
            let commonHeader = `import numpy as np\nimport scipy.linalg\nfrom functools import reduce\ndef krons(*args): return reduce(np.kron, args)\nI = np.identity(2, dtype=complex)\nX = np.array([[0, 1], [1, 0]], dtype=complex)\nY = np.array([[0, -1j], [1j, 0]], dtype=complex)\nZ = np.array([[1, 0], [0, -1]], dtype=complex)\nops = {'I': I, 'X': X, 'Y': Y, 'Z': Z}\n`;

            if (SimulationType === "Generic") {
                const MatrixData = generateAdjacencymatrix();
                initCode = `import numpy as np\nimport scipy.linalg\nH = np.array(${JSON.stringify(MatrixData)}, dtype=complex)\n${getStateBuilderCode("len(H)")}`;
            } 
            await pyodide.runPythonAsync(initCode);

            updateStatus("Calculating 100 intervals. Please wait...");
            
            const batchPlotCode = `
import json
import numpy as np
import scipy.linalg

t_vals = np.linspace(0, ${maxTime}, 100)
all_probs = []

for t in t_vals:
    U = scipy.linalg.expm(-1j * H * t)
    psi = U @ state
    probs = np.abs(psi)**2
    all_probs.append(probs.tolist())

json.dumps({'time': t_vals.tolist(), 'probs': all_probs})
`;
            try {
                let res = await pyodide.runPythonAsync(batchPlotCode);
                let plotData = JSON.parse(res);
                drawChartJsGraph(plotData);
                updateStatus("Plot generated.");
            } catch(e) { console.error(e); updateStatus("Failed to generate plot data."); }
        }

        function drawChartJsGraph(data) {
            document.getElementById("chartContainer").style.display = "block";
            const ctx = document.getElementById("probChart").getContext("2d");

            if (windowChartInstance) windowChartInstance.destroy();

            const times = data.time.map(t => t.toFixed(2));
            const datasets = [];
            const numStates = data.probs[0].length;

            for (let i = 0; i < numStates; i++) {
                let nodeLabel = nodes[i] ? nodes[i].label : `State ${i}`; 
                if (SimulationType === "Generic") nodeLabel = `Node ${nodes[i] ? nodes[i].id : i}`;
                
                let hue = Math.floor((i * 360) / numStates);
                datasets.push({
                    label: nodeLabel,
                    data: data.probs.map(p => p[i]),
                    borderColor: `hsl(${hue}, 70%, 45%)`,
                    backgroundColor: `hsla(${hue}, 70%, 45%, 0.1)`,
                    borderWidth: 1.5,
                    fill: false,
                    pointRadius: 0,
                    tension: 0.1 
                });
            }

            windowChartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: times, datasets: datasets },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false, },
                    plugins: { title: { display: true, text: 'Probability Distribution vs Time' }, legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } } },
                    scales: { x: { title: { display: true, text: 'Time (t)' } }, y: { title: { display: true, text: 'Probability |ψ|²' }, min: 0, max: 1 } }
                }
            });
            document.getElementById("chartContainer").scrollIntoView({ behavior: "smooth" });
        }
    </script>
